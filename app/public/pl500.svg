<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc44"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <rect width="400" height="400" rx="40" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Chart line decoration -->
  <polyline points="30,320 80,300 130,310 180,280 220,260 260,220 300,180 340,140 370,100"
    fill="none" stroke="url(#green)" stroke-width="3" opacity="0.3"/>
  <polyline points="30,340 80,330 130,335 180,310 220,290 260,260 300,230 340,200 370,170"
    fill="none" stroke="url(#green)" stroke-width="2" opacity="0.15"/>
  <!-- PL text -->
  <text x="200" y="160" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif"
    font-size="100" font-weight="900" fill="url(#gold)" letter-spacing="-2">PL</text>
  <!-- 500 text -->
  <text x="200" y="280" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif"
    font-size="140" font-weight="900" fill="#ffffff" letter-spacing="-4">500</text>
  <!-- Subtitle -->
  <text x="200" y="340" text-anchor="middle" font-family="'Courier New', monospace"
    font-size="22" fill="#888" letter-spacing="6">KRONOS</text>
  <!-- Small mysteryBox accent -->
  <circle cx="200" cy="370" r="6" fill="none" stroke="#ff3333" stroke-width="2" opacity="0.5"/>
  <line x1="194" y1="370" x2="206" y2="370" stroke="#ff3333" stroke-width="2" opacity="0.5"/>
</svg>